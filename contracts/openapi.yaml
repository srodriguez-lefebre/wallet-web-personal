components:
  schemas:
    ErrorEnvelope:
      properties:
        data:
          type: "null"
        error:
          properties:
            code:
              type: string
            message:
              type: string
          required:
            - code
            - message
          type: object
      required:
        - data
        - error
      type: object
  securitySchemes:
    ingestBearer:
      description: Dedicated INGEST_API_TOKEN
      scheme: bearer
      type: http
    sessionBearer:
      description: Signed session returned by auth.unlock
      scheme: bearer
      type: http
info:
  description: Private pre-1.0 API. Backward compatibility is not guaranteed; frontend and backend change together.
  title: Wallet Web Personal API
  version: 0.1.0
openapi: 3.1.0
